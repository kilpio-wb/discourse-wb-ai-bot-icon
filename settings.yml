icon_color:
  type: string
  default: "#4AF626"
  description: "Primary color of the AI bot icon (hex code)"

icon_glow_color:
  type: string
  default: "#4AF626"
  description: "Glow color around the icon (hex code)"

icon_bg_color:
  type: string
  default: "#1a1a2e"
  description: "Background circle color behind the icon"

enable_pulse_animation:
  type: bool
  default: true
  description: "Enable a subtle pulse animation to draw attention"

icon_scale:
  type: string
  default: "1.3"
  description: "Scale multiplier for the icon size (e.g. 1.0 = normal, 1.5 = 50% bigger)"

greeting_text:
  type: string
  default: "Ask AI"
  description: "Short label shown next to the bot icon"

show_greeting_label:
  type: bool
  default: true
  description: "Show a text label next to the icon"
